name: Check whether the flake evaluates and run its tests
on: push
jobs:
  nix-flake-check:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Install Nix
        uses: cachix/install-nix-action@v27
      - name: Create passwords database stub for the installer image
        run: |
          sudo mkdir -p /home/bmr/Documents
          sudo touch /home/bmr/Documents/passwords.kdbx
      - name: Check flake and run its tests
        run: nix flake check --print-build-logs --impure
